# Auto-generated by scaffold.py -- edit as needed for this analysis.
# All scripts run through: pixi run py script.py

[workspace]
name = "{name}"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
pandoc-crossref = ">=0.3"
tectonic = ">=0.15"
ruff = ">=0.1"

# --- Core stack (always needed) ---
[pypi-dependencies]
uproot = ">=5.0"
awkward = ">=2.0"
hist = ">=2.7"
boost-histogram = ">=1.4"
numpy = ">=1.24"
scipy = ">=1.11"
matplotlib = ">=3.8"
mplhep = ">=1.1.0"
vector = ">=1.1"
particle = ">=0.23"
rich = ">=13.0"
iminuit = ">=2.25"
# --- Uncomment groups below as needed ---
# # Statistical models and fitting
# pyhf = ">=0.7"
# cabinetry = ">=0.6"
# # Unbinned likelihood fits
# zfit = ">=0.20"
# # MVA / classification
# xgboost = ">=2.0"
# scikit-learn = ">=1.3"
# # Columnar event processing at scale
# coffea = ">=2024.0"

[tasks]
py = "python"
build-pdf = "cd phase5_draft/outputs && pandoc ANALYSIS_NOTE.md -o ANALYSIS_NOTE.tex --standalone --include-in-header=../../preamble.tex --number-sections --toc --filter pandoc-crossref --citeproc && python ../../scripts/postprocess_tex.py ANALYSIS_NOTE.tex ANALYSIS_NOTE_pp.tex && tectonic ANALYSIS_NOTE_pp.tex"
lint-plots = "python scripts/lint_plots.py ."
lint = "ruff check ."
format = "ruff format ."
